<!DOCTYPE html>
<html>
<head>
    <style>
        /* Targeting the body to change the entire page color */
        body {
            background-color: #BE7EBD;
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }

        /* Centering the header */
        .header-container {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: white; /* Making the text readable against the red */
	    font-size: 40px;
        }
        
        /* Optional: Making the form look cleaner against the red */
        form, h2 {
            color: white;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>community watch</h1>
    </div>
</body>
</html>
